# Continuous Integration pipeline
# Runs on every push and pull request.
# Validates the project builds and tests correctly before releases.
# Uses GoReleaser's check to validate the release configuration.

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.24']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test ./... -race -coverprofile=coverage.out -covermode=atomic

      - name: Upload coverage (optional)
        if: matrix.go-version == '1.24'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.out
          fail_ci_if_error: false

      - name: Verify build for all targets (smoke)
        run: |
          GOOS=linux GOARCH=amd64 go build -o /dev/null ./cmd/proc-lens
          GOOS=linux GOARCH=arm64 go build -o /dev/null ./cmd/proc-lens
          GOOS=darwin GOARCH=amd64 go build -o /dev/null ./cmd/proc-lens
          GOOS=darwin GOARCH=arm64 go build -o /dev/null ./cmd/proc-lens
          GOOS=windows GOARCH=amd64 go build -o /dev/null ./cmd/proc-lens

      - name: Run GoReleaser check (validate pipeline config)
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Allow deprecation warnings for now (dockers are being migrated to dockers_v2 in a future update).
        # The check still surfaces the warnings in the logs.
        continue-on-error: true

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: golangci-lint (optional - falls back gracefully if no config)
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m
        continue-on-error: true  # Non-blocking until .golangci.yml is added

      - name: Go vet
        run: go vet ./...

      - name: Go mod tidy check
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum || (echo "go.mod/go.sum not tidy" && exit 1)
