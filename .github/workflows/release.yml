# Production-grade Release Pipeline
#
# - Triggered only on version tags (v*.*.*)
# - Uses GoReleaser for:
#   - Cross-platform static binaries (Linux, macOS, Windows; amd64 + arm64)
#   - Multi-arch Docker images pushed to GHCR (GitHub Container Registry)
#   - Docker manifests for :version and :latest
#   - Checksums + SBOMs
#   - Cosign keyless signing of images (via OIDC)
#   - Automated GitHub Release with nice notes
# - Follows GitHub Container registry best practices:
#   - Authenticates with GITHUB_TOKEN (not a PAT) for publishing
#   - Includes org.opencontainers.image.source label (via Dockerfile + build args)
#     so the package is automatically linked to this repository.
# - Fully reproducible and supply-chain secure
# - The original local development flow (`docker build`, `make docker-build`) still works.

name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    # Manual trigger to quickly publish container images to GHCR
    # without creating a full release tag. Perfect for testing that
    # the container package appears in GitHub Packages > Containers.

permissions:
  contents: write
  packages: write
  id-token: write   # Required for cosign keyless signing
  attestations: write

jobs:
  goreleaser:
    name: Release with GoReleaser
    runs-on: ubuntu-latest
    # Only run full release (binaries + containers via goreleaser) on version tags
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Important for GoReleaser changelog + version

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Set up QEMU (for multi-arch Docker builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR (GitHub Container Registry)
        # Authenticates using GITHUB_TOKEN so that packages published by this workflow
        # are associated with the repository (see GitHub Container registry docs).
        # Requires "packages: write" permission (set at job level).
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign (for image signing)
        uses: sigstore/cosign-installer@v3

      - name: Install syft (required by GoReleaser for SBOM generation)
        uses: anchore/sbom-action/download-syft@v0

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GoReleaser will automatically pick up GITHUB_REPOSITORY_OWNER and GITHUB_REPOSITORY
          # from the environment for ghcr.io image names and release ownership.

  # Optional but recommended production step: also release the Helm chart
  # This keeps the main Go/Docker release driven by GoReleaser while providing
  # a clean way to version the Helm chart in deploy/proc-lens/
  release-helm:
    name: Release Helm Chart
    runs-on: ubuntu-latest
    needs: goreleaser
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.0

      - name: Add dependency chart repos (if any)
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami || true
          helm repo update || true

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1
        with:
          charts_dir: deploy
          config_path: .github/cr.yaml   # Optional extra config
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          CR_OWNER: ${{ github.repository_owner }}

  # Manual container publish job
  # Trigger this via "Run workflow" button in Actions to quickly build & push
  # multi-arch images to GHCR so you can see the package under
  # Repo > Packages > Containers (or https://github.com/owner/repo/pkgs/container/proc-lens)
  publish-container:
    name: Publish Container Image to GHCR (manual)
    runs-on: ubuntu-latest
    # Only run when manually triggered via workflow_dispatch
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (for multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/proc-lens
          tags: |
            type=sha
            type=raw,value=manual
            type=raw,value=latest,enable=true
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=manual-${{ github.sha }}

# Production tip:
# After a successful release you can also:
# - Use the generated SBOMs + signed images for compliance / supply chain security
# - The binaries + Docker images are the primary deliverables driven by GoReleaser
# - Local development commands (`docker build`, make targets) continue to work unchanged.
#
# To see containers in GitHub:
# Go to your repo → Packages (or directly: https://github.com/OWNER/REPO/pkgs/container/proc-lens)
# The image will appear under "Containers" once pushed via this workflow or on tags.
