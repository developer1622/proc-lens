# Production-grade Release Pipeline
#
# - Triggered only on version tags (v*.*.*)
# - Uses GoReleaser for:
#   - Cross-platform static binaries (Linux, macOS, Windows; amd64 + arm64)
#   - Multi-arch Docker images pushed to GHCR (GitHub Container Registry)
#   - Docker manifests for :version and :latest
#   - Checksums + SBOMs
#   - Cosign keyless signing of images (via OIDC)
#   - Automated GitHub Release with nice notes
# - Follows GitHub Container registry best practices:
#   - Authenticates with GITHUB_TOKEN (not a PAT) for publishing
#   - Includes org.opencontainers.image.source label (via Dockerfile + build args)
#     so the package is automatically linked to this repository.
# - Fully reproducible and supply-chain secure
# - The original local development flow (`docker build`, `make docker-build`) still works.

name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write
  id-token: write   # Required for cosign keyless signing
  attestations: write

jobs:
  goreleaser:
    name: Release with GoReleaser
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Important for GoReleaser changelog + version

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Set up QEMU (for multi-arch Docker builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR (GitHub Container Registry)
        # Authenticates using GITHUB_TOKEN so that packages published by this workflow
        # are associated with the repository (see GitHub Container registry docs).
        # Requires "packages: write" permission (set at job level).
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign (for image signing)
        uses: sigstore/cosign-installer@v3

      - name: Install syft (required by GoReleaser for SBOM generation)
        uses: anchore/sbom-action/download-syft@v0

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GoReleaser will automatically pick up GITHUB_REPOSITORY_OWNER and GITHUB_REPOSITORY
          # from the environment for ghcr.io image names and release ownership.

  # Optional but recommended production step: also release the Helm chart
  # This keeps the main Go/Docker release driven by GoReleaser while providing
  # a clean way to version the Helm chart in deploy/proc-lens/
  release-helm:
    name: Release Helm Chart
    runs-on: ubuntu-latest
    needs: goreleaser
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.0

      - name: Add dependency chart repos (if any)
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami || true
          helm repo update || true

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1
        with:
          charts_dir: deploy
          config_path: .github/cr.yaml   # Optional extra config
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          CR_OWNER: ${{ github.repository_owner }}

# Production tip:
# After a successful release you can also:
# - Use the generated SBOMs + signed images for compliance / supply chain security
# - The binaries + Docker images are the primary deliverables driven by GoReleaser
# - Local development commands (`docker build`, make targets) continue to work unchanged.
