# Production-grade Release Pipeline
#
# - Triggered only on version tags (v*.*.*)
# - Uses GoReleaser for:
#   - Cross-platform static binaries (Linux, macOS, Windows; amd64 + arm64)
#   - Multi-arch Docker images pushed to GHCR (proc-lens)
#   - Docker manifests for :version and :latest
#   - Checksums + SBOMs
#   - Cosign keyless signing of images (via OIDC)
#   - Automated GitHub Release with nice notes
# - Fully reproducible and supply-chain secure
# - The original local development flow (`docker build`, `make docker-build`) still works.

name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write
  id-token: write   # Required for cosign keyless signing
  attestations: write

jobs:
  goreleaser:
    name: Release with GoReleaser
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0   # Important for GoReleaser changelog + version

      - name: Set up Go
        uses: actions/setup-go@f111f3307d8850f5010000e31836c8413dbca978 # v5.3.0
        with:
          go-version: '1.24'
          cache: true

      - name: Set up QEMU (for multi-arch Docker builds)
        uses: docker/setup-qemu-action@f95c887834b5a2b22ec643f2757a153259bef88f # v3.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@c304028f5780d52672f208346610a6f0907d27e2 # v3.8.0

      - name: Login to GHCR
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign (for image signing)
        uses: sigstore/cosign-installer@d2bf0aa01e23351ec85b40cf39366e6b41d2f782 # v3.8.1

      - name: Install syft (required by GoReleaser for SBOM generation)
        uses: anchore/sbom-action/download-syft@df80a981bc184349472397e6c0a14abbc83e2096 # v0.17.9

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@90a319d084ebc77d941d3e813f6681d4b68e0d4c # v6.1.0
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GoReleaser will automatically pick up GITHUB_REPOSITORY_OWNER and GITHUB_REPOSITORY
          # from the environment for ghcr.io image names and release ownership.

  # Optional but recommended production step: also release the Helm chart
  # This keeps the main Go/Docker release driven by GoReleaser while providing
  # a clean way to version the Helm chart in deploy/proc-lens/
  release-helm:
    name: Release Helm Chart
    runs-on: ubuntu-latest
    needs: goreleaser
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@fe7b79cd5ee1e45176fcad797db217cc70f188ab # v4.2.0
        with:
          version: v3.17.0

      - name: Add dependency chart repos (if any)
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami || true
          helm repo update || true

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@a3454e4ae9b37c688d00289e6024be51421c1722 # v1.6.0
        with:
          charts_dir: deploy
          config_path: .github/cr.yaml   # Optional extra config
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          CR_OWNER: ${{ github.repository_owner }}

# Production tip:
# After a successful release you can also:
# - Use the generated SBOMs + signed images for compliance / supply chain security
# - The binaries + Docker images are the primary deliverables driven by GoReleaser
# - Local development commands (`docker build`, make targets) continue to work unchanged.
