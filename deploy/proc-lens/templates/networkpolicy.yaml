{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "proc-lens.fullname" . }}
  labels:
    {{- include "proc-lens.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "proc-lens.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: 8091
      {{- if .Values.networkPolicy.ingress }}
      from:
        {{- toYaml .Values.networkPolicy.ingress | nindent 8 }}
      {{- end }}
{{- end }}

